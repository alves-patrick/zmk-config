# sofle_right.conf
#
# O sofle.conf global já habilita tudo que o trackpad precisa:
#   CONFIG_ZMK_MOUSE=y, CONFIG_I2C=y, CONFIG_INPUT_AZOTEQ_IQS5XX=y,
#   CONFIG_ZMK_POINTING=y, CONFIG_INPUT=y, CONFIG_ZMK_SPLIT=y, etc.
#
# Aqui só desligamos o display, pois o lado direito não tem OLED.
CONFIG_ZMK_DISPLAY=n
CONFIG_ZMK_USB_LOGGING=y
