# Core Features
CONFIG_KCONFIG_WERROR=n
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_INPUT_SPLIT=y

CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Mouse e I2C (Essencial para o Azoteq)
CONFIG_ZMK_MOUSE=y
CONFIG_INPUT=y
CONFIG_I2C=y
CONFIG_INPUT_AZOTEQ_IQS5XX=y
CONFIG_ZMK_POINTING=y

# Conectividade e Split (Tente desativar o experimental se não estabilizar)
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
CONFIG_ZMK_SPLIT=y

# Power Management
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Encoders e RGB
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y
CONFIG_ZMK_EXT_POWER=y
CONFIG_I2C_SHELL=y
# Se você quer que ela mostre a camada atual e o status do rádio
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y
CONFIG_ZMK_KEYBOARD_NAME="Sofle Patrick"

# Garante que o lado esquerdo (Central) seja o mestre das camadas
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Widgets obrigatórios para aparecer Camada e Conexão
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
CONFIG_ZMK_WIDGET_WPM_STATUS=y
CONFIG_ZMK_SPLIT_PERIPHERAL_HID_INDICATORS=y

CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Ativa o Widget de animação (escolha apenas um)
CONFIG_NICE_OLED_WIDGET_ANIMATION_CAT=y

# Aumenta a memória para a animação não dar lag
CONFIG_LV_Z_MEM_POOL_SIZE=16384




